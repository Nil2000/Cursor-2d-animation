name: "CI: Main App"
on:
  pull_request:
    branches:
      - "**"
    paths:
      - "main-app/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Load env
        run: cp .env.example .env

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Drizzle generate
        run: bun run db:generate

      - name: Build
        run: bun run build

  check-types:
    name: Check types
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Load env
        run: cp .env.example .env

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Drizzle generate
        run: bun run db:generate

      - name: Check types
        run: bunx tsc --noEmit

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Load env
        run: cp .env.example .env

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Drizzle generate
        run: bun run db:generate

      - name: Lint
        run: bun run lint
