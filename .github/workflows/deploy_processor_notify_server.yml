name: Deploy processor & notify-server (VPS)
on:
  push:
    branches:
      - "deploy"
  workflow_dispatch:
    inputs:
      reason:
        description: "Why are you deploying?"
        required: false
        default: "Manual deploy"

env:
  REGISTRY_PREFIX: ghcr.io/nil2000/cursor-for-2d-animations
  VPS_DEPLOY_PATH: /root/cursor_workers

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to ghcr
        run: echo "${{ secrets.GH_TOKEN }}" | docker login ghcr.io -u nil2000 --password-stdin

      - name: Build and push processor
        run: |
          docker build -t ${{ env.REGISTRY_PREFIX }}/processor-prod:latest . -f docker/Dockerfile.processor
          docker push ${{ env.REGISTRY_PREFIX }}/processor-prod:latest

      - name: Build and push notify-server
        run: |
          docker build -t ${{ env.REGISTRY_PREFIX }}/notify-server-prod:latest . -f docker/Dockerfile.notify-server
          docker push ${{ env.REGISTRY_PREFIX }}/notify-server-prod:latest

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up SSH agent
        uses: webfactory/ssh-agent@v0.9.1
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      - name: Ensure deploy directory on VPS
        run: |
          ssh -o StrictHostKeyChecking=no "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" \
            "mkdir -p '${{ env.VPS_DEPLOY_PATH }}'"

      - name: Copy compose file to VPS
        run: |
          scp -o StrictHostKeyChecking=no docker-compose.vps.yml \
            "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:${{ env.VPS_DEPLOY_PATH }}/"

      - name: Write .env on VPS from secrets
        run: |
          ssh -o StrictHostKeyChecking=no "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" << 'REMOTE'
          set -e
          cd '${{ env.VPS_DEPLOY_PATH }}'
          cat > .env << EOL
          REDIS_QUEUE_NAME="${{ secrets.REDIS_QUEUE_NAME }}"
          INTERNAL_API_KEY="${{ secrets.INTERNAL_API_KEY }}"
          API_URL="${{ secrets.API_URL }}"
          S3_PUBLIC_CUSTOM_DOMAIN="${{ secrets.S3_PUBLIC_CUSTOM_DOMAIN }}"
          NOTIFY_SERVER_SECRET="${{ secrets.NOTIFY_SERVER_SECRET }}"
          PORT="4001"
          HOST="0.0.0.0"
          EOL
          chmod 600 .env
          REMOTE

      - name: Pull images and restart stack
        run: |
          ssh -o StrictHostKeyChecking=no "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" << 'REMOTE_END'
          set -e
          cd '${{ env.VPS_DEPLOY_PATH }}'
          echo "${{ secrets.GH_TOKEN }}" | docker login ghcr.io -u nil2000 --password-stdin
          docker compose -f docker-compose.vps.yml down
          docker compose -f docker-compose.vps.yml pull
          docker compose -f docker-compose.vps.yml up -d --remove-orphans
          REMOTE_END
